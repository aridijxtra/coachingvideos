<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Feed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --color-oker:        #D4A017;
      --color-oker-light:  #E8C060;
      --color-oker-dark:   #A87C0C;
      --color-blauw:       #0D1F3C;
      --color-blauw-mid:   #163260;
      --color-zwart:       #111111;
      --color-wit:         #F7F4EE;
      --color-grijs:       #C8C4B8;
      --font-display:      'Source Sans 3', Segoe UI, serif;
      --font-body:         'Source Sans 3', 'Segoe UI', sans-serif;
      --shadow-lg:         0 16px 48px rgba(13,31,60,.45);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--color-blauw);
      font-family: var(--font-body);
      color: var(--color-wit);
    }

    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 56px;
      background: linear-gradient(180deg, rgba(13,31,60,0.97) 0%, rgba(13,31,60,0.0) 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      pointer-events: none;
    }
    .header__logo {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 900;
      color: var(--color-wit);
      letter-spacing: 0.03em;
    }
    .header__logo span { color: var(--color-oker); }
    .header__counter {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-oker);
      background: rgba(13,31,60,0.6);
      border: 1px solid rgba(212,160,23,0.35);
      border-radius: 999px;
      padding: 4px 14px;
    }

    .feed {
      position: fixed;
      inset: 0;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .feed::-webkit-scrollbar { display: none; }

    .slide {
      position: relative;
      width: 100%;
      height: 100dvh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-zwart);
      overflow: hidden;
    }
    .slide::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(13,31,60,0.8) 0%, rgba(13,31,60,0.98) 100%);
      z-index: 1;
    }

    .video-wrap {
      position: relative;
      z-index: 2;
      width: min(100vw, calc(100dvh * 9/16));
      height: 100dvh;
      background: #000;
      box-shadow: var(--shadow-lg);
    }
    .video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
    }
    .video-wrap::before {
      content: '';
      position: absolute;
      left: 0; top: 15%; bottom: 15%;
      width: 3px;
      background: var(--color-oker);
      border-radius: 999px;
      z-index: 10;
      opacity: 0.8;
    }

    .video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--color-blauw);
      z-index: 5;
      cursor: pointer;
      transition: opacity 0.4s ease;
    }
    .video-placeholder.hidden { opacity: 0; pointer-events: none; }
    .placeholder-thumb {
      width: 100%; height: 100%;
      position: absolute; inset: 0;
      object-fit: cover; opacity: 0.4;
    }
    .placeholder-play {
      position: relative; z-index: 2;
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--color-oker);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 40px rgba(212,160,23,0.5);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .placeholder-play:hover {
      transform: scale(1.1);
      box-shadow: 0 0 60px rgba(212,160,23,0.7);
    }
    .placeholder-play svg { width: 30px; height: 30px; fill: var(--color-zwart); margin-left: 4px; }
    .placeholder-label {
      position: relative; z-index: 2;
      font-family: var(--font-display);
      font-size: 0.9rem; font-weight: 700;
      color: var(--color-wit); text-align: center;
      opacity: 0.8; letter-spacing: 0.05em;
    }

    .slide-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      padding: 60px 20px 28px;
      background: linear-gradient(0deg, rgba(13,31,60,0.92) 0%, transparent 100%);
      pointer-events: none;
    }
    .slide-info__num {
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--color-oker); margin-bottom: 4px;
    }
    .slide-info__title {
      font-family: var(--font-display);
      font-size: clamp(0.95rem, 2.5vw, 1.2rem);
      font-weight: 700; color: var(--color-wit);
      line-height: 1.3; margin-bottom: 6px; max-width: 80%;
    }
    .slide-info__tag {
      display: inline-block;
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      background: rgba(212,160,23,0.2);
      border: 1px solid rgba(212,160,23,0.45);
      color: var(--color-oker-light);
      border-radius: 999px; padding: 3px 12px;
    }

    .scroll-hint {
      position: absolute;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: flex; flex-direction: column;
      align-items: center; gap: 6px;
      opacity: 1; transition: opacity 0.5s ease;
      pointer-events: none;
    }
    .scroll-hint.hidden { opacity: 0; }
    .scroll-hint__arrow { width: 24px; height: 24px; animation: bounce 1.4s infinite; }
    .scroll-hint__text {
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--color-grijs);
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(6px); }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header__logo">Video<span>Feed</span></div>
  <div class="header__counter" id="counter">1 / 32</div>
</header>

<div class="feed" id="feed"></div>

<script>
  const extractId = url => {
    const m = url.match(/(?:youtu\.be\/|v=)([\w-]{11})/);
    return m ? m[1] : null;
  };

  const suppliedVideos = [
    { url: 'https://youtu.be/148Lcj2FXT8?si=s8vtPhkex1pbtQdi', title: 'Video 1', tag: 'Nieuw' },
    { url: 'https://youtu.be/Zr9my29auMU?si=lsMEX4KeqSBb5apx', title: 'Video 2', tag: 'Uitgelicht' },
  ];

  const placeholderIds = [
    'dQw4w9WgXcQ','jNQXAC9IVRw','9bZkp7q19f0','kffacxfA7G4','CevxZvSJLk8',
    'pRpeEdMmmQ0','OPf0YbXqDm0','_OBlgSz8sSM','hTWKbfoikeg','tgbNymZ7vqY',
    'JRfuAukYTKg','NN-KPmRbQYU','p3G5IveMLSg','l482T0yNkeo','fJ9rUzIMcZQ',
    'hHW1oY26kxQ','fRh_vgS2dFE','2vjPBrBU-TM','UxxajLWwzqY','mzvGHHuFHnA',
    'nfWlot6h_JM','r32LcBqiv0I','4m1EFMoRFvY','9wNDSGtBr7E','hX_HC4ZKJXI',
    'OheyKqrD5ME','jHnuoROlKHk','Y9N9XRIkGec','7maJOI3QMu0','8aGhZQkoFbQ',
  ];

  const videoList = [];
  suppliedVideos.forEach((v, i) => {
    videoList.push({ id: extractId(v.url), title: v.title, tag: v.tag, num: i + 1 });
  });
  placeholderIds.forEach((id, i) => {
    videoList.push({
      id,
      title: `Video ${i + 3}`,
      tag: ['Tips','Inspiratie','Uitleg','Nieuws','Praktijk'][i % 5],
      num: i + 3
    });
  });

  const feed    = document.getElementById('feed');
  const counter = document.getElementById('counter');

  videoList.forEach((v, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide';
    slide.dataset.index = i;

    const placeholder = document.createElement('div');
    placeholder.className = 'video-placeholder';
    placeholder.innerHTML = `
      <img class="placeholder-thumb" src="https://img.youtube.com/vi/${v.id}/hqdefault.jpg" alt="" loading="lazy" />
      <div class="placeholder-play"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>
      <div class="placeholder-label">Tik om te spelen</div>
    `;

    const wrap = document.createElement('div');
    wrap.className = 'video-wrap';
    wrap.appendChild(placeholder);

    placeholder.addEventListener('click', () => {
      const iframe = document.createElement('iframe');
      iframe.src = `https://www.youtube.com/embed/${v.id}?autoplay=1&rel=0&modestbranding=1&playsinline=1&enablejsapi=1`;
      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
      iframe.allowFullscreen = true;
      wrap.appendChild(iframe);
      placeholder.classList.add('hidden');
    });

    const info = document.createElement('div');
    info.className = 'slide-info';
    info.innerHTML = `
      <div class="slide-info__num"># ${String(v.num).padStart(2,'0')}</div>
      <div class="slide-info__title">${v.title}</div>
      <span class="slide-info__tag">${v.tag}</span>
    `;

    slide.appendChild(wrap);
    slide.appendChild(info);

    if (i === 0) {
      const hint = document.createElement('div');
      hint.className = 'scroll-hint';
      hint.id = 'scrollHint';
      hint.innerHTML = `
        <svg class="scroll-hint__arrow" viewBox="0 0 24 24" fill="none" stroke="#C8C4B8" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
        <span class="scroll-hint__text">Scroll voor meer</span>
      `;
      slide.appendChild(hint);
    }

    feed.appendChild(slide);
  });

  const allSlides    = feed.querySelectorAll('.slide');
  const total        = videoList.length;
  let currentIndex   = 0;
  let isJumping      = false;

  function pauseIframe(iframe) {
    if (!iframe) return;
    try {
      iframe.contentWindow.postMessage(
        JSON.stringify({ event: 'command', func: 'pauseVideo', args: [] }), '*'
      );
    } catch (e) {}
  }

  function pauseSlide(idx) {
    const iframe = allSlides[idx] && allSlides[idx].querySelector('iframe');
    pauseIframe(iframe);
  }

  function setActive(idx) {
    currentIndex = idx;
    const realIdx = ((idx % total) + total) % total;
    counter.textContent = `${realIdx + 1} / ${total}`;
    if (idx > 0) {
      const hint = document.getElementById('scrollHint');
      if (hint) hint.classList.add('hidden');
    }
  }

  const observer = new IntersectionObserver(entries => {
    if (isJumping) return;
    entries.forEach(entry => {
      const idx = parseInt(entry.target.dataset.index, 10);
      if (entry.isIntersecting && entry.intersectionRatio > 0.5) {
        setActive(idx);
        if (idx === total - 1) {
          setTimeout(() => {
            isJumping = true;
            pauseSlide(total - 1);
            feed.scrollTo({ top: 0, behavior: 'instant' });
            currentIndex = 0;
            setTimeout(() => { isJumping = false; }, 50);
          }, 800);
        }
      } else if (!entry.isIntersecting) {
        pauseIframe(entry.target.querySelector('iframe'));
      }
    });
  }, { threshold: 0.5 });

  allSlides.forEach(s => observer.observe(s));

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
      const next = (currentIndex + 1) % total;
      pauseSlide(currentIndex);
      allSlides[next].scrollIntoView({ behavior: 'smooth' });
    } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
      const prev = (currentIndex - 1 + total) % total;
      pauseSlide(currentIndex);
      allSlides[prev].scrollIntoView({ behavior: 'smooth' });
    }
  });
</script>
</body>
</html>
