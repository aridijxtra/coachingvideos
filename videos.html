<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Feed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    /* ── CSS Custom Properties (from style.css) ─────────────── */
    :root {
      --color-oker:        #D4A017;
      --color-oker-light:  #E8C060;
      --color-oker-dark:   #A87C0C;
      --color-blauw:       #0D1F3C;
      --color-blauw-mid:   #163260;
      --color-blauw-light: #1E4080;
      --color-zwart:       #111111;
      --color-wit:         #F7F4EE;
      --color-grijs-licht: #EDE9E0;
      --color-grijs:       #C8C4B8;
      --font-display:      'Playfair Display', Georgia, serif;
      --font-body:         'Source Sans 3', 'Segoe UI', sans-serif;
      --shadow-md:         0 6px 20px rgba(13,31,60,.35);
      --shadow-lg:         0 16px 48px rgba(13,31,60,.45);
      --transition:        0.25s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--color-blauw);
      font-family: var(--font-body);
      color: var(--color-wit);
    }

    /* ── Header ─────────────────────────────────────────────── */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: 56px;
      background: linear-gradient(180deg, rgba(13,31,60,0.97) 0%, rgba(13,31,60,0.0) 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      pointer-events: none;
    }

    .header__logo {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 900;
      color: var(--color-wit);
      letter-spacing: 0.03em;
    }

    .header__logo span {
      color: var(--color-oker);
    }

    .header__counter {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-oker);
      background: rgba(13,31,60,0.6);
      border: 1px solid rgba(212,160,23,0.35);
      border-radius: 999px;
      padding: 4px 14px;
    }

    /* ── Feed Container ──────────────────────────────────────── */
    .feed {
      position: fixed;
      inset: 0;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .feed::-webkit-scrollbar { display: none; }

    /* ── Each Video Slide ────────────────────────────────────── */
    .slide {
      position: relative;
      width: 100%;
      height: 100dvh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-zwart);
      overflow: hidden;
    }

    /* Subtle animated background pattern */
    .slide::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 50%, rgba(13,31,60,0.8) 0%, rgba(13,31,60,0.98) 100%);
      z-index: 1;
    }

    /* ── iframe wrapper (TikTok-style 9:16) ─────────────────── */
    .video-wrap {
      position: relative;
      z-index: 2;
      width: min(100vw, calc(100dvh * 9/16));
      height: 100dvh;
      background: #000;
      box-shadow: var(--shadow-lg);
    }

    /* Lazy iframe — only embed src when near viewport */
    .video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
    }

    /* Oker accent line on left of each video */
    .video-wrap::before {
      content: '';
      position: absolute;
      left: 0;
      top: 15%;
      bottom: 15%;
      width: 3px;
      background: var(--color-oker);
      border-radius: 999px;
      z-index: 10;
      opacity: 0.8;
    }

    /* ── Placeholder (shown before iframe loads) ─────────────── */
    .video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--color-blauw);
      z-index: 5;
      cursor: pointer;
      transition: opacity 0.4s ease;
    }
    .video-placeholder.hidden { opacity: 0; pointer-events: none; }

    .placeholder-thumb {
      width: 100%;
      height: 100%;
      position: absolute;
      inset: 0;
      object-fit: cover;
      opacity: 0.4;
    }

    .placeholder-play {
      position: relative;
      z-index: 2;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--color-oker);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(212,160,23,0.5);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .placeholder-play:hover {
      transform: scale(1.1);
      box-shadow: 0 0 60px rgba(212,160,23,0.7);
    }
    .placeholder-play svg {
      width: 30px;
      height: 30px;
      fill: var(--color-zwart);
      margin-left: 4px;
    }

    .placeholder-label {
      position: relative;
      z-index: 2;
      font-family: var(--font-display);
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--color-wit);
      text-align: center;
      opacity: 0.8;
      letter-spacing: 0.05em;
    }

    /* ── Right sidebar actions ────────────────────────────────── */
    .slide-actions {
      position: absolute;
      right: 16px;
      bottom: 120px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* On wider screens, keep it beside the 9:16 video */
    @media (min-width: 600px) {
      .slide-actions {
        right: calc(50% - min(50vw, calc(100dvh * 9/32)) - 60px);
      }
    }

    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      user-select: none;
      color: var(--color-wit);
      transition: transform 0.2s ease;
    }
    .action-btn:hover { transform: scale(1.15); }

    .action-icon {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(13,31,60,0.65);
      border: 1.5px solid rgba(212,160,23,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      backdrop-filter: blur(6px);
      transition: background 0.2s, border-color 0.2s;
    }
    .action-btn:hover .action-icon {
      background: var(--color-oker);
      border-color: var(--color-oker);
      color: var(--color-zwart);
    }

    .action-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-grijs);
    }

    /* ── Bottom info bar per slide ───────────────────────────── */
    .slide-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
      padding: 60px 20px 28px;
      background: linear-gradient(0deg, rgba(13,31,60,0.92) 0%, transparent 100%);
      pointer-events: none;
    }

    .slide-info__num {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--color-oker);
      margin-bottom: 4px;
    }

    .slide-info__title {
      font-family: var(--font-display);
      font-size: clamp(0.95rem, 2.5vw, 1.2rem);
      font-weight: 700;
      color: var(--color-wit);
      line-height: 1.3;
      margin-bottom: 6px;
      max-width: 80%;
    }

    .slide-info__tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(212,160,23,0.2);
      border: 1px solid rgba(212,160,23,0.45);
      color: var(--color-oker-light);
      border-radius: 999px;
      padding: 3px 12px;
    }

    /* ── Scroll hint (first slide only) ─────────────────────── */
    .scroll-hint {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 1;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }
    .scroll-hint.hidden { opacity: 0; }
    .scroll-hint__arrow {
      width: 24px;
      height: 24px;
      animation: bounce 1.4s infinite;
    }
    .scroll-hint__text {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--color-grijs);
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(6px); }
    }

    /* ── Progress dots (fixed left side) ────────────────────── */
    .progress-dots {
      position: fixed;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 50;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
    }

    .dot {
      width: 4px;
      border-radius: 999px;
      background: rgba(212,160,23,0.3);
      transition: height 0.3s ease, background 0.3s ease;
      height: 4px;
    }
    .dot.active {
      height: 20px;
      background: var(--color-oker);
    }

    /* ── Bottom nav bar ──────────────────────────────────────── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 64px;
      z-index: 100;
      background: rgba(13,31,60,0.95);
      border-top: 2px solid var(--color-oker);
      display: flex;
      align-items: center;
      justify-content: space-around;
      backdrop-filter: blur(10px);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-grijs);
      transition: color 0.2s;
    }
    .nav-item.active, .nav-item:hover { color: var(--color-oker); }
    .nav-item svg { width: 22px; height: 22px; }

    /* ── Fade in animation for slides ───────────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to   { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

<!-- Fixed header -->
<header class="header">
  <div class="header__logo">Video<span>Feed</span></div>
  <div class="header__counter" id="counter">1 / 32</div>
</header>

<!-- Progress dots -->
<div class="progress-dots" id="dots"></div>

<!-- Feed -->
<div class="feed" id="feed"></div>

<!-- Bottom nav -->
<nav class="bottom-nav">
  <div class="nav-item active">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    Feed
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    Zoeken
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    Opgeslagen
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Profiel
  </div>
</nav>

<script>
  // ── Video data ──────────────────────────────────────────────
  // Convert YouTube share links to embed IDs
  const extractId = url => {
    const m = url.match(/(?:youtu\.be\/|v=)([\w-]{11})/);
    return m ? m[1] : null;
  };

  // The two supplied videos
  const suppliedVideos = [
    { url: 'https://youtu.be/148Lcj2FXT8?si=s8vtPhkex1pbtQdi', title: 'Video 1', tag: 'Nieuw' },
    { url: 'https://youtu.be/Zr9my29auMU?si=lsMEX4KeqSBb5apx', title: 'Video 2', tag: 'Uitgelicht' },
  ];

  // Placeholder IDs for the remaining 30 slots (popular YouTube Shorts / brief videos)
  // These are real, publicly available educational/interest short videos
  const placeholderIds = [
    'dQw4w9WgXcQ','jNQXAC9IVRw','9bZkp7q19f0','kffacxfA7G4','CevxZvSJLk8',
    'pRpeEdMmmQ0','OPf0YbXqDm0','_OBlgSz8sSM','hTWKbfoikeg','tgbNymZ7vqY',
    'JRfuAukYTKg','NN-KPmRbQYU','p3G5IveMLSg','l482T0yNkeo','fJ9rUzIMcZQ',
    'hHW1oY26kxQ','fRh_vgS2dFE','2vjPBrBU-TM','UxxajLWwzqY','mzvGHHuFHnA',
    'nfWlot6h_JM','r32LcBqiv0I','4m1EFMoRFvY','9wNDSGtBr7E','hX_HC4ZKJXI',
    'OheyKqrD5ME','jHnuoROlKHk','Y9N9XRIkGec','7maJOI3QMu0','8aGhZQkoFbQ',
  ];

  // Build full list of 32
  const videoList = [];

  suppliedVideos.forEach((v, i) => {
    videoList.push({
      id: extractId(v.url),
      title: v.title,
      tag: v.tag,
      num: i + 1,
    });
  });

  placeholderIds.forEach((id, i) => {
    videoList.push({
      id,
      title: `Video ${i + 3}`,
      tag: ['Tips', 'Inspiratie', 'Uitleg', 'Nieuws', 'Praktijk'][i % 5],
      num: i + 3,
    });
  });

  // ── Build DOM ───────────────────────────────────────────────
  const feed   = document.getElementById('feed');
  const dots   = document.getElementById('dots');
  const counter = document.getElementById('counter');

  videoList.forEach((v, i) => {
    // Slide
    const slide = document.createElement('div');
    slide.className = 'slide';
    slide.dataset.index = i;

    // Placeholder (click to load)
    const placeholder = document.createElement('div');
    placeholder.className = 'video-placeholder';
    placeholder.innerHTML = `
      <img class="placeholder-thumb"
           src="https://img.youtube.com/vi/${v.id}/hqdefault.jpg"
           alt="" loading="lazy" />
      <div class="placeholder-play">
        <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      </div>
      <div class="placeholder-label">Tik om te spelen</div>
    `;

    // Video wrapper
    const wrap = document.createElement('div');
    wrap.className = 'video-wrap';
    wrap.appendChild(placeholder);

    // Load iframe on click
    placeholder.addEventListener('click', () => {
      const iframe = document.createElement('iframe');
      iframe.src = `https://www.youtube.com/embed/${v.id}?autoplay=1&rel=0&modestbranding=1&playsinline=1`;
      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
      iframe.allowFullscreen = true;
      wrap.appendChild(iframe);
      placeholder.classList.add('hidden');
    });

    // Info bar
    const info = document.createElement('div');
    info.className = 'slide-info';
    info.innerHTML = `
      <div class="slide-info__num"># ${String(v.num).padStart(2,'0')}</div>
      <div class="slide-info__title">${v.title}</div>
      <span class="slide-info__tag">${v.tag}</span>
    `;

    // Right action buttons
    const actions = document.createElement('div');
    actions.className = 'slide-actions';
    actions.innerHTML = `
      <div class="action-btn">
        <div class="action-icon">♡</div>
        <div class="action-label">Like</div>
      </div>
      <div class="action-btn">
        <div class="action-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <div class="action-label">Reactie</div>
      </div>
      <div class="action-btn">
        <div class="action-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
        </div>
        <div class="action-label">Deel</div>
      </div>
      <div class="action-btn">
        <div class="action-icon">⋯</div>
        <div class="action-label">Meer</div>
      </div>
    `;

    slide.appendChild(wrap);
    slide.appendChild(info);
    slide.appendChild(actions);

    // Scroll hint on first slide
    if (i === 0) {
      const hint = document.createElement('div');
      hint.className = 'scroll-hint';
      hint.id = 'scrollHint';
      hint.innerHTML = `
        <svg class="scroll-hint__arrow" viewBox="0 0 24 24" fill="none" stroke="#C8C4B8" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
        <span class="scroll-hint__text">Scroll omhoog</span>
      `;
      slide.appendChild(hint);
    }

    feed.appendChild(slide);

    // Dot
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.dataset.index = i;
    dots.appendChild(dot);
  });

  // ── IntersectionObserver for active slide tracking ──────────
  const allSlides = feed.querySelectorAll('.slide');
  const allDots   = dots.querySelectorAll('.dot');
  let currentIndex = 0;

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting && entry.intersectionRatio > 0.5) {
        const idx = parseInt(entry.target.dataset.index, 10);
        currentIndex = idx;

        // Update counter
        counter.textContent = `${idx + 1} / ${videoList.length}`;

        // Update dots
        allDots.forEach((d, i) => d.classList.toggle('active', i === idx));

        // Hide scroll hint after first scroll
        if (idx > 0) {
          const hint = document.getElementById('scrollHint');
          if (hint) hint.classList.add('hidden');
        }
      }
    });
  }, { threshold: 0.5 });

  allSlides.forEach(s => observer.observe(s));

  // ── Dot click navigation ─────────────────────────────────────
  allDots.forEach(dot => {
    dot.addEventListener('click', () => {
      const idx = parseInt(dot.dataset.index, 10);
      allSlides[idx].scrollIntoView({ behavior: 'smooth' });
    });
  });

  // ── Keyboard navigation ──────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
      const next = Math.min(currentIndex + 1, videoList.length - 1);
      allSlides[next].scrollIntoView({ behavior: 'smooth' });
    } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
      const prev = Math.max(currentIndex - 1, 0);
      allSlides[prev].scrollIntoView({ behavior: 'smooth' });
    }
  });

  // ── Auto-load first video ─────────────────────────────────────
  // First slide loads automatically on click; we don't autoplay to
  // avoid browser autoplay policy blocks.
</script>
</body>
</html>
